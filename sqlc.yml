version: "2"
sql:
  - engine: "postgresql"
    queries: "./internal/platform/persistence/queries"
    schema: "./migrations"
    gen:
      go:
        package: "sqlc"
        out: "./internal/platform/persistence/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "organization_status"
            go_type: "string"
          - db_type: "workspace_status"
            go_type: "string"
          - db_type: "user_status"
            go_type: "string"
          - db_type: "workspace_role"
            go_type: "string"
          - db_type: "api_key_status"
            go_type: "string"
