# Working directory
root = "."
tmp_dir = "tmp"

[build]
	cmd = "go build -o ./tmp/worker ./cmd/worker"
	bin = "tmp/worker"
	include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml", "env"]
	exclude_dir = ["assets", "tmp", "vendor", "frontend/node_modules"]
	include_dir = []
	include_file = []
	exclude_file = []
	delay = 0 # ms
	send_interrupt = true
	log = "build-worker.log"

[log]
	time = true

[color]
	main = "magenta"
	watcher = "cyan"
	build = "yellow"
	runner = "green"