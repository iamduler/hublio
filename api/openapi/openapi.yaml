openapi: 3.1.0
info:
  title: Hublio API
  version: 1.0.0
  description: |
    Business Integration + Orchestration Platform API.

    Interactive docs (Scalar) are served at `/docs` in development.
servers:
  - url: http://localhost:8080
    description: Local
  - url: /api/v1
    description: Relative (when browsing via /docs)

tags:
  - name: System
  - name: Auth
  - name: Identity
  - name: Integration
  - name: Orchestration
  - name: Events
  - name: Machine

paths:
  /health:
    get:
      tags: [System]
      summary: Liveness probe
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Process is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: hublio-api

  /ready:
    get:
      tags: [System]
      summary: Readiness probe
      operationId: getReady
      security: []
      responses:
        "200":
          description: Dependencies OK
        "503":
          description: Degraded (Postgres/Redis)

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register organization + owner + default workspace
      operationId: authRegister
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login and issue JWT + refresh token
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "401":
          $ref: "#/components/responses/Error"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke refresh token
      operationId: authLogout
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Logged out
        "400":
          $ref: "#/components/responses/Error"

  /api/v1/identity/organizations/{organizationId}:
    get:
      tags: [Identity]
      summary: Get organization
      operationId: getOrganization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/organizationId"
      responses:
        "200":
          description: Organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/identity/organizations/{organizationId}/suspend:
    post:
      tags: [Identity]
      summary: Suspend organization
      operationId: suspendOrganization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/organizationId"
      responses:
        "200":
          description: Suspended
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"

  /api/v1/identity/organizations/{organizationId}/activate:
    post:
      tags: [Identity]
      summary: Activate suspended organization
      operationId: activateOrganization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/organizationId"
      responses:
        "200":
          description: Activated

  /api/v1/identity/organizations/{organizationId}/workspaces:
    get:
      tags: [Identity]
      summary: List workspaces
      operationId: listWorkspaces
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/organizationId"
      responses:
        "200":
          description: Workspace list
    post:
      tags: [Identity]
      summary: Create workspace
      operationId: createWorkspace
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/organizationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, environment]
              properties:
                name:
                  type: string
                environment:
                  type: string
                  example: production
      responses:
        "201":
          description: Workspace created

  /api/v1/identity/workspaces/{workspaceId}/enable:
    post:
      tags: [Identity]
      summary: Enable workspace
      operationId: enableWorkspace
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      responses:
        "200":
          description: Enabled

  /api/v1/identity/workspaces/{workspaceId}/disable:
    post:
      tags: [Identity]
      summary: Disable workspace
      operationId: disableWorkspace
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      responses:
        "200":
          description: Disabled

  /api/v1/identity/workspaces/{workspaceId}/members:
    post:
      tags: [Identity]
      summary: Add user to workspace
      operationId: addWorkspaceMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum: [owner, admin, member]
      responses:
        "201":
          description: Member added

  /api/v1/identity/workspaces/{workspaceId}/api-keys:
    get:
      tags: [Identity]
      summary: List API keys
      operationId: listAPIKeys
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      responses:
        "200":
          description: API keys (never includes plaintext)
    post:
      tags: [Identity]
      summary: Create API key (plaintext returned once)
      operationId: createAPIKey
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Created; includes plaintext once

  /api/v1/identity/workspaces/{workspaceId}/api-keys/{apiKeyId}/disable:
    post:
      tags: [Identity]
      summary: Disable API key
      operationId: disableAPIKey
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/apiKeyId"
      responses:
        "200":
          description: Disabled

  /api/v1/identity/workspaces/{workspaceId}/api-keys/{apiKeyId}/rotate:
    post:
      tags: [Identity]
      summary: Rotate API key (new plaintext once)
      operationId: rotateAPIKey
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/apiKeyId"
      responses:
        "200":
          description: Rotated

  /api/v1/integration/connectors:
    get:
      tags: [Integration]
      summary: List Connectors
      operationId: listConnectors
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Connector list
    post:
      tags: [Integration]
      summary: Register a Connector (platform admin / seed)
      operationId: registerConnector
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterConnectorRequest"
      responses:
        "201":
          description: Connector registered
        "400":
          $ref: "#/components/responses/Error"

  /api/v1/integration/connectors/{connectorId}:
    get:
      tags: [Integration]
      summary: Get Connector
      operationId: getConnector
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/connectorId"
      responses:
        "200":
          description: Connector
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/integration/connectors/{connectorId}/enable:
    post:
      tags: [Integration]
      summary: Enable Connector
      operationId: enableConnector
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/connectorId"
      responses:
        "200":
          description: Enabled
        "409":
          $ref: "#/components/responses/Error"

  /api/v1/integration/connectors/{connectorId}/disable:
    post:
      tags: [Integration]
      summary: Disable Connector
      operationId: disableConnector
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/connectorId"
      responses:
        "200":
          description: Disabled
        "409":
          $ref: "#/components/responses/Error"

  /api/v1/integration/connectors/{connectorId}/remove:
    post:
      tags: [Integration]
      summary: Remove Connector (terminal)
      operationId: removeConnector
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/connectorId"
      responses:
        "200":
          description: Removed
        "409":
          $ref: "#/components/responses/Error"

  /api/v1/integration/workspaces/{workspaceId}/connections:
    get:
      tags: [Integration]
      summary: List Connections in a Workspace
      operationId: listConnections
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      responses:
        "200":
          description: Connection list
        "403":
          $ref: "#/components/responses/Error"
    post:
      tags: [Integration]
      summary: Create Connection (Draft) with initial Credential
      operationId: createConnection
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConnectionRequest"
      responses:
        "201":
          description: Connection created; credential never includes plaintext/ciphertext
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /api/v1/integration/workspaces/{workspaceId}/connections/{connectionId}:
    get:
      tags: [Integration]
      summary: Get Connection
      operationId: getConnection
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/connectionId"
      responses:
        "200":
          description: Connection
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/integration/workspaces/{workspaceId}/connections/{connectionId}/verify:
    post:
      tags: [Integration]
      summary: Verify Connection (Draft/VerificationFailed -> Verifying -> Active|VerificationFailed)
      operationId: verifyConnection
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/connectionId"
      responses:
        "200":
          description: Verification finished (inspect status; active or verification_failed)
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /api/v1/integration/workspaces/{workspaceId}/connections/{connectionId}/disable:
    post:
      tags: [Integration]
      summary: Disable Connection
      operationId: disableConnection
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/connectionId"
      responses:
        "200":
          description: Disabled
        "409":
          $ref: "#/components/responses/Error"

  /api/v1/integration/workspaces/{workspaceId}/connections/{connectionId}/enable:
    post:
      tags: [Integration]
      summary: Enable Connection (must have been previously verified)
      operationId: enableConnection
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/connectionId"
      responses:
        "200":
          description: Enabled
        "409":
          $ref: "#/components/responses/Error"

  /api/v1/integration/workspaces/{workspaceId}/connections/{connectionId}/credentials/rotate:
    post:
      tags: [Integration]
      summary: Rotate Credential (revokes previous, never returns secret)
      operationId: rotateCredential
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/connectionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RotateCredentialRequest"
      responses:
        "201":
          description: Rotated; response never includes plaintext or ciphertext
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"

  /api/v1/integration/workspaces/{workspaceId}/sync-routes:
    get:
      tags: [Integration]
      summary: List SyncRoutes in a Workspace
      operationId: listSyncRoutes
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      responses:
        "200":
          description: SyncRoute list (webhook_secret never included)
    post:
      tags: [Integration]
      summary: Create SyncRoute (Draft)
      description: |
        Workspace-scoped origin → destination fan-out configuration (not a Workflow).
        When trigger_type is webhook|both, generates a webhook secret; plaintext is returned
        once in the response as webhook_secret and never again (use rotate to re-issue).
      operationId: createSyncRoute
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSyncRouteRequest"
      responses:
        "201":
          description: Created (may include webhook_secret once)
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"

  /api/v1/integration/workspaces/{workspaceId}/sync-routes/{syncRouteId}:
    get:
      tags: [Integration]
      summary: Get SyncRoute
      operationId: getSyncRoute
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/syncRouteId"
      responses:
        "200":
          description: SyncRoute (has_webhook_secret flag; no plaintext)
        "404":
          $ref: "#/components/responses/Error"
    patch:
      tags: [Integration]
      summary: Update SyncRoute (Draft or Disabled only)
      operationId: updateSyncRoute
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/syncRouteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSyncRouteRequest"
      responses:
        "200":
          description: Updated
        "409":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Integration]
      summary: Soft-delete SyncRoute (must not be Enabled)
      operationId: deleteSyncRoute
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/syncRouteId"
      responses:
        "200":
          description: Deleted
        "409":
          $ref: "#/components/responses/Error"

  /api/v1/integration/workspaces/{workspaceId}/sync-routes/{syncRouteId}/enable:
    post:
      tags: [Integration]
      summary: Enable SyncRoute
      operationId: enableSyncRoute
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/syncRouteId"
      responses:
        "200":
          description: Enabled
        "400":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /api/v1/integration/workspaces/{workspaceId}/sync-routes/{syncRouteId}/disable:
    post:
      tags: [Integration]
      summary: Disable SyncRoute
      operationId: disableSyncRoute
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/syncRouteId"
      responses:
        "200":
          description: Disabled
        "409":
          $ref: "#/components/responses/Error"

  /api/v1/integration/workspaces/{workspaceId}/sync-routes/{syncRouteId}/webhook-secret/rotate:
    post:
      tags: [Integration]
      summary: Rotate SyncRoute webhook secret (plaintext once)
      operationId: rotateSyncRouteWebhookSecret
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/syncRouteId"
      responses:
        "200":
          description: Rotated; response includes webhook_secret once
        "400":
          $ref: "#/components/responses/Error"

  /api/v1/integration/workspaces/{workspaceId}/sync-routes/{syncRouteId}/watermarks:
    get:
      tags: [Integration]
      summary: List poll watermarks for a SyncRoute
      operationId: listSyncRouteWatermarks
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/syncRouteId"
      responses:
        "200":
          description: Watermark list

  /api/v1/integration/workspaces/{workspaceId}/sync-routes/{syncRouteId}/watermarks/{resourceType}:
    put:
      tags: [Integration]
      summary: Upsert poll watermark cursor
      operationId: upsertSyncRouteWatermark
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - $ref: "#/components/parameters/syncRouteId"
        - name: resourceType
          in: path
          required: true
          schema:
            type: string
            example: invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cursor]
              properties:
                cursor:
                  type: object
                  additionalProperties: true
                  example:
                    last_updated_at: "2026-07-19T00:00:00Z"
                    last_record_id: "123"
      responses:
        "200":
          description: Upserted

  /api/v1/webhooks/sync-routes/{syncRouteId}:
    post:
      tags: [Orchestration]
      summary: Inbound SyncRoute webhook (shared-secret header)
      description: |
        Public ingress (no JWT / API key). Validates `X-Hublio-Webhook-Secret` against the
        SyncRoute encrypted secret (constant-time), checks Enabled + webhook|both trigger,
        resource_type allow-list, and optional JSON filter. On success submits a Business
        Intent bound to the SyncRoute source Connection and fans out to one Execution per
        activity step (sequential or parallel per group; optional reverse). Response includes
        `execution_id` (first) and `execution_ids` (all). Idempotency key may be supplied or
        is derived from workspace + route + resource + operation + business key. Never logs
        the webhook secret.
      operationId: acceptSyncRouteWebhook
      security: []
      parameters:
        - $ref: "#/components/parameters/syncRouteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptWebhookRequest"
      responses:
        "201":
          description: Intent created (or accepted)
        "200":
          description: Idempotent replay
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /api/v1/sync-routes/{syncRouteId}/poll:
    post:
      tags: [Orchestration]
      summary: Run SyncRoute poll tick (watermark + list + Intent fan-out)
      description: |
        API Key ops/smoke endpoint. Pulls from the SyncRoute source Connection via list
        capability (default `invoice.list`) using the Postgres watermark cursor, filters
        each record, submits Intents with fan-out, then advances the watermark after a
        successful pull cycle (docs/30 §7.2). The worker also ticks Enabled schedule|both
        routes on `POLL_TICK_INTERVAL_SECONDS` (default 30s) via `integration.poll_sync_route`
        jobs. Destination Execution failures do not roll back the watermark.
      operationId: triggerSyncRoutePoll
      security:
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/syncRouteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resource_type]
              properties:
                resource_type:
                  type: string
                  example: invoice
      responses:
        "200":
          description: Poll completed (may accept zero records)
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /api/v1/intents:
    post:
      tags: [Orchestration]
      summary: Submit a Business Intent (Workspace-scoped, API Key)
      description: |
        Resolves the Connection (must be Active), creates the Intent (Submitted), then
        Accepts or Rejects it based on payload/capability validity. On Accept, creates and
        Queues one Execution (direct submit) and enqueues the `orchestration.execution`
        worker job. SyncRoute webhook ingress may fan out to multiple Executions under the
        same Intent. Idempotency-Key is required; replays return the original Intent/Execution(s).
      operationId: submitIntent
      security:
        - apiKeyAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitIntentRequest"
      responses:
        "201":
          description: Intent submitted (created)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "200":
          description: Idempotency-Key replay of a previously submitted Intent
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /api/v1/intents/{intentId}:
    get:
      tags: [Orchestration]
      summary: Get Intent (tenant-scoped)
      operationId: getIntent
      security:
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/intentId"
      responses:
        "200":
          description: Intent
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/executions/{executionId}:
    get:
      tags: [Orchestration]
      summary: Get Execution (with Steps/Timeline; tenant-scoped)
      operationId: getExecution
      security:
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/executionId"
      responses:
        "200":
          description: Execution
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/executions/{executionId}/cancel:
    post:
      tags: [Orchestration]
      summary: Cancel a Queued/Running Execution (terminal)
      operationId: cancelExecution
      security:
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/executionId"
      responses:
        "200":
          description: Cancelled
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /api/v1/executions/{executionId}/retry:
    post:
      tags: [Orchestration]
      summary: Manually retry a Failed Execution (Failed -> Queued)
      description: |
        Replay (new Execution for the same Intent) is deferred in v1: executions.intent_id is
        UNIQUE, so retry re-runs the same Execution row instead of creating a new one.
      operationId: retryExecution
      security:
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/executionId"
      responses:
        "200":
          description: Retry scheduled (re-enqueued)
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /api/v1/executions/{executionId}/timeline:
    get:
      tags: [Orchestration]
      summary: Get Execution timeline (Observability, F3; tenant-scoped)
      description: |
        Focused view of the same execution_timelines rows already returned inline by
        GET /api/v1/executions/{executionId}.
      operationId: getExecutionTimeline
      security:
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/executionId"
      responses:
        "200":
          description: Execution timeline
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/events:
    get:
      tags: [Events]
      summary: List persisted Platform Events (Observability, F3; Workspace-scoped)
      description: |
        Append-only PlatformEvent facts (`events` table) published after a successful
        Identity/Integration/Orchestration commit. Never used to schedule work (Event
        Platform is not a work queue).
      operationId: listEvents
      security:
        - apiKeyAuth: []
      parameters:
        - name: execution_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        "200":
          description: Events
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

  /api/v1/health:
    get:
      tags: [Machine]
      summary: Machine health (API key)
      operationId: machineHealth
      security:
        - apiKeyAuth: []
      responses:
        "200":
          description: OK
        "401":
          $ref: "#/components/responses/Error"

  /api/v1/platform/queue/health:
    post:
      tags: [Machine]
      summary: Enqueue platform.health job
      operationId: enqueuePlatformHealth
      security:
        - apiKeyAuth: []
      responses:
        "202":
          description: Accepted
        "401":
          $ref: "#/components/responses/Error"

  /api/v1/platform/metrics:
    get:
      tags: [Machine]
      summary: Observability counters (Phase F, JSON; API key)
      description: |
        In-memory, per-process counters: executions_succeeded_total, executions_failed_total,
        events_published_total, audit_records_total, plus best-effort queue_depth (Redis LLEN).
        Same payload as GET /metrics (unauthenticated) for scrapers that expect that path.
      operationId: platformMetrics
      security:
        - apiKeyAuth: []
      responses:
        "200":
          description: Metrics snapshot
        "401":
          $ref: "#/components/responses/Error"

  /metrics:
    get:
      tags: [Machine]
      summary: Observability counters (Phase F, JSON; unauthenticated)
      operationId: metrics
      responses:
        "200":
          description: Metrics snapshot

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token from POST /api/v1/auth/login
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
      description: Workspace API key plaintext (prefix.secret)

  parameters:
    organizationId:
      name: organizationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    workspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    apiKeyId:
      name: apiKeyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    connectorId:
      name: connectorId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    connectionId:
      name: connectionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    syncRouteId:
      name: syncRouteId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    intentId:
      name: intentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    executionId:
      name: executionId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Error:
      description: Error envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    SuccessEnvelope:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
        data:
          description: Payload varies by endpoint

    ErrorEnvelope:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
          example: BAD_REQUEST
        detail:
          type: string

    RegisterRequest:
      type: object
      required: [organization_name, email, password, full_name]
      properties:
        organization_name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        full_name:
          type: string
        workspace_name:
          type: string
          default: default
        environment:
          type: string
          default: production

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RegisterConnectorRequest:
      type: object
      required: [code, name, vendor, category, version]
      properties:
        code:
          type: string
          example: misa
          description: Built-in codes include fake, misa, nhanh (seeded on API boot).
        name:
          type: string
        vendor:
          type: string
        category:
          type: string
          enum: [source, destination, bidirectional, utility]
        version:
          type: string
          example: 1.0.0
        description:
          type: string
        homepage:
          type: string
        documentation_url:
          type: string
        capabilities:
          type: array
          items:
            type: object
            required: [code, display_name]
            properties:
              code:
                type: string
                example: invoice.create
              display_name:
                type: string
              is_async:
                type: boolean
                default: false

    CreateConnectionRequest:
      type: object
      required: [connector_id, name, environment, credential_type, secret]
      properties:
        connector_id:
          type: string
          format: uuid
        name:
          type: string
        is_default:
          type: boolean
          default: false
        description:
          type: string
        environment:
          type: string
          example: sandbox
        config:
          type: object
          description: |
            Provider-agnostic Connection config (JSONB). Examples:
            MISA — tax_code, inv_series, optional base_url (default testapi.meinvoice.vn/api/integration),
            optional sign_type (default 2);
            Nhanh — app_id, business_id, optional base_url (default pos.open.nhanh.vn/v3.0).
          example:
            tax_code: "0101243150"
            inv_series: "1C25TYY"
            base_url: "https://testapi.meinvoice.vn/api/integration"
        retry_policy:
          type: object
        timeout_seconds:
          type: integer
          default: 30
        credential_type:
          type: string
          enum: [api_key, oauth2, bearer_token, basic_auth, jwt]
        secret:
          type: object
          description: |
            Plaintext credential fields; encrypted at rest, never echoed back.
            MISA — app_id, username, password (tax_code may live here or in config);
            Nhanh — access_token.
          example:
            app_id: "your-misa-app-id"
            username: "user@example.com"
            password: "********"
        credential_expires_at:
          type: string
          format: date-time

    SubmitIntentRequest:
      type: object
      required: [connection_id, capability]
      properties:
        connection_id:
          type: string
          format: uuid
        capability:
          type: string
          example: invoice.create
          description: |
            Must match a capability on the Connection's Connector.
            MISA — invoice.create; Nhanh — invoice.get, invoice.update_status; Fake — echo.
        payload:
          type: object
          description: |
            Canonical-ish business payload (JSONB). For MISA invoice.create include at least
            invoice_number, issue_date, customer.name, and items[].
          example:
            invoice_number: "INV-100"
            issue_date: "2026-07-15T10:00:00Z"
            currency: VND
            customer:
              name: "Cong ty ABC"
              tax_code: "0300000000"
            items:
              - code: SKU-1
                name: "San pham 1"
                quantity: 2
                unit_price: 100000
                vat_rate: "10%"
            subtotal: 200000
            total: 220000
        correlation_id:
          type: string
          description: Defaults to the request's correlation id when omitted

    RotateCredentialRequest:
      type: object
      required: [credential_type, secret]
      properties:
        credential_type:
          type: string
          enum: [api_key, oauth2, bearer_token, basic_auth, jwt]
        secret:
          type: object
          description: Plaintext credential fields; encrypted at rest, never echoed back
        expires_at:
          type: string
          format: date-time

    CreateSyncRouteRequest:
      type: object
      required: [source_connection_id, name, trigger_type, resource_types, activities]
      properties:
        source_connection_id:
          type: string
          format: uuid
        name:
          type: string
          example: Nhanh to MISA invoices
        trigger_type:
          type: string
          enum: [webhook, schedule, both]
        resource_types:
          type: array
          items:
            type: string
          example: [invoice]
        schedule:
          type: object
          description: |
            Required when trigger_type is schedule|both. MVP key: interval_seconds (1..86400).
            Optional list_capability overrides the source pull capability (default invoice.list).
          example:
            interval_seconds: 300
            list_capability: invoice.list
        filter:
          type: object
          description: JSON condition tree (AND/OR); not a Rule Engine
        idempotency_rule:
          type: object
          example:
            rule: provider_triple
        activities:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SyncRouteActivityGroup"
        reverse:
          $ref: "#/components/schemas/SyncRouteReverse"
        retry_policy:
          type: object

    UpdateSyncRouteRequest:
      type: object
      properties:
        name:
          type: string
        source_connection_id:
          type: string
          format: uuid
        trigger_type:
          type: string
          enum: [webhook, schedule, both]
        resource_types:
          type: array
          items:
            type: string
        schedule:
          type: object
        filter:
          type: object
        idempotency_rule:
          type: object
        activities:
          type: array
          items:
            $ref: "#/components/schemas/SyncRouteActivityGroup"
        reverse:
          $ref: "#/components/schemas/SyncRouteReverse"
        clear_reverse:
          type: boolean
          default: false
        retry_policy:
          type: object

    SyncRouteActivityGroup:
      type: object
      required: [group_mode, steps]
      properties:
        group_mode:
          type: string
          enum: [sequential, parallel]
        steps:
          type: array
          minItems: 1
          items:
            type: object
            required: [destination_connection_id, capability]
            properties:
              destination_connection_id:
                type: string
                format: uuid
              capability:
                type: string
                example: invoice.create
              mapping_key:
                type: string

    SyncRouteReverse:
      type: object
      required: [capability]
      properties:
        capability:
          type: string
          example: invoice.update_status
        on:
          type: string
          enum: [success, failure, always]
          default: success

    AcceptWebhookRequest:
      type: object
      required: [resource_type, payload]
      properties:
        resource_type:
          type: string
          example: invoice
        operation:
          type: string
          description: Defaults to upsert; used in derived idempotency key
          example: create
        payload:
          type: object
          description: Canonical-ish business payload for the Intent
          additionalProperties: true
          example:
            invoice_number: "INV-100"
            issue_date: "2026-07-15T10:00:00Z"
            currency: VND
            customer:
              name: "Cong ty ABC"
            items:
              - name: "San pham 1"
                quantity: 1
                unit_price: 100000
        idempotency_key:
          type: string
          description: Optional; when omitted Hublio derives a stable key
        correlation_id:
          type: string
